data:
  train_dataset:
    vla_preprocess_args:
      _target_: alpamayo.processor.qwen_processor.get_preprocess_data_fn_from_model_config
      chat_template_version: r1_5
      components_order:
      - image
      - question
      - answer
      components_prompt:
      - answer
      label_components:
      - answer
      include_camera_ids: true
      include_frame_nums: true
      generation_mode: false
    _recursive_: false
    _target_: alpamayo.data.lingoqa.LingoQADataset
    local_dir: null
    chunk_ids: 0-99
    use_default_keyframe: true
    data_root: /data/wesleyferreiramaia/wokzone-alpamayo/data/roadwork/lingoqa_roadwork
    parquet_name: train.parquet
  val_dataset:
    vla_preprocess_args:
      _target_: alpamayo.processor.qwen_processor.get_preprocess_data_fn_from_model_config
      chat_template_version: r1_5
      components_order:
      - image
      - question
      - answer
      components_prompt:
      - answer
      label_components:
      - answer
      include_camera_ids: true
      include_frame_nums: true
      generation_mode: false
    _recursive_: false
    _target_: alpamayo.data.lingoqa.LingoQADataset
    local_dir: null
    chunk_ids: 99-100
    use_default_keyframe: true
    data_root: /data/wesleyferreiramaia/wokzone-alpamayo/data/roadwork/lingoqa_roadwork
    parquet_name: val.parquet
  collate_fn:
    _target_: alpamayo.processor.qwen_processor.collate_fn_from_model_config
    _partial_: true
    chat_template_version: r1_5
paths:
  output_dir: /data/wesleyferreiramaia/wokzone-alpamayo/checkpoints/sft_stage4_student
callbacks: {}
evaluate:
  max_eval_steps: -1
  torch_dtype: bfloat16
  metric_runner: null
trainer:
  output_dir: ${paths.output_dir}
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-06
  warmup_steps: 50
  logging_steps: 10
  save_steps: 2000
  save_total_limit: 2
  num_train_epochs: 1
  bf16: true
  dataloader_pin_memory: true
  dataloader_num_workers: 4
  remove_unused_columns: false
  report_to: none
  lr_scheduler_type: cosine_warmup_with_min_lr
  lr_scheduler_kwargs:
    min_lr: 1.0e-06
  deepspeed: null
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  lr_multiplier:
    vlm.model.visual: 0.1
    expert: 0.0
  eval_steps: 2000
  eval_strategy: steps
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  ddp_find_unused_parameters: false
task_name: alpamayo_stage4_student_sft
run_name: ${task_name}_${now:%Y%m%d}_${now:%H%M%S}
model:
  _target_: alpamayo1_5_sft.models.sft_base_model.TrainableReasoningVLA.from_alpamayo_checkpoint
  checkpoint_path: /data/wesleyferreiramaia/wokzone-alpamayo/checkpoints/kd_stage3_roadwork_v2
  vlm_name_or_path: /data/wesleyferreiramaia/wokzone-alpamayo/models/Cosmos-Reason2-2B
